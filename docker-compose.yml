version: '3.8'
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: ${DB_NAME:-sqlnode}
      POSTGRES_USER: ${DB_USER:-docker}
      POSTGRES_PASSWORD: ${DB_PASS:-docker}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-docker} -d ${DB_NAME:-sqlnode}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: npm run dev
    ports:
      - '${PORT:-3333}:${PORT:-3333}'
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3333}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-sqlnode}
      DB_USER: ${DB_USER:-docker}
      DB_PASS: ${DB_PASS:-docker}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
